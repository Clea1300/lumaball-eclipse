<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Luma Ball League — Eclipse Season</title>
<style>
  :root{
    --astral-gold:#f4d9a0;
    --astral-cream:#fff8ec;
    --obsidian-violet:#8a6bd6;
    --obsidian-dark:#1a1430;
    --cyan:#7df9ff;
    --bg:#070912;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);
    font-family:'Segoe UI',system-ui,sans-serif; color:#fff; touch-action:manipulation;}
  #app{position:fixed;inset:0;display:flex;flex-direction:column;
    background:url('./assets/arena_bg.jpg') center/cover no-repeat;}
  #app::before{content:'';position:absolute;inset:0;
    background:linear-gradient(180deg, rgba(7,9,18,.55) 0%, rgba(7,9,18,.35) 35%, rgba(7,9,18,.75) 100%);
    pointer-events:none;}

  /* HEADER */
  #header{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;
    padding:8px 10px 4px;text-align:center;flex-shrink:0;}
  #header h1{margin:0;font-size:clamp(16px,4.2vw,28px);letter-spacing:3px;font-weight:800;
    background:linear-gradient(90deg,var(--astral-gold),#fff,var(--obsidian-violet));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 20px rgba(244,217,160,.3);}
  #header .sub{font-size:clamp(9px,2.4vw,13px);opacity:.75;letter-spacing:1px;margin-top:2px;}

  /* SCOREBOARD */
  #scoreboard{position:relative;z-index:2;display:flex;align-items:center;justify-content:center;
    gap:clamp(10px,4vw,40px);padding:8px 10px;flex-shrink:0;}
  .score-block{display:flex;flex-direction:column;align-items:center;min-width:90px;}
  .score-block .team-name{font-size:clamp(10px,2.6vw,14px);font-weight:700;letter-spacing:1px;}
  .score-block.astral .team-name{color:var(--astral-gold);}
  .score-block.obsidian .team-name{color:var(--obsidian-violet);}
  .score-block .num{font-size:clamp(28px,8vw,46px);font-weight:900;line-height:1;
    text-shadow:0 0 15px currentColor;}
  .score-block.astral .num{color:var(--astral-gold);}
  .score-block.obsidian .num{color:var(--obsidian-violet);}
  #ball-icon{width:clamp(40px,10vw,60px);height:clamp(40px,10vw,60px);border-radius:50%;
    background:url('./assets/luma_ball.png') center/cover no-repeat;
    box-shadow:0 0 20px rgba(255,255,255,.5); animation:spin 8s linear infinite;}
  @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
  #ball-icon.pulse{animation:spin 8s linear infinite, pulseball .6s ease-out;}
  @keyframes pulseball{0%{transform:scale(1)}40%{transform:scale(1.5)}100%{transform:scale(1)}}
  #round-label{font-size:clamp(9px,2.2vw,12px);opacity:.7;letter-spacing:2px;margin-top:2px;}

  /* MUTE TOGGLE */
  #mute-btn{position:absolute;top:8px;right:8px;z-index:5;border:1px solid rgba(244,217,160,.35);
    background:rgba(15,12,30,.6);color:var(--astral-cream);border-radius:8px;
    font-size:clamp(9px,2.2vw,11px);padding:5px 9px;cursor:pointer;letter-spacing:.5px;
    backdrop-filter:blur(3px);}
  #mute-btn:active{transform:scale(.95);}

  /* FLYING BALL */
  #fly-ball{position:fixed;width:46px;height:46px;border-radius:50%;
    background:url('./assets/luma_ball.png') center/cover no-repeat;
    box-shadow:0 0 24px rgba(255,255,255,.7); z-index:8; pointer-events:none;
    opacity:0; left:0; top:0;}
  #fly-ball.flying{opacity:1;}
  @keyframes flyToGoal{
    0%{opacity:1; transform:translate(0,0) scale(1) rotate(0deg);}
    70%{opacity:1; transform:translate(var(--fx),var(--fy)) scale(1.3) rotate(540deg);}
    100%{opacity:0; transform:translate(var(--fx),var(--fy)) scale(.4) rotate(620deg);}
  }
  @keyframes flyBlocked{
    0%{opacity:1; transform:translate(0,0) scale(1) rotate(0deg);}
    55%{opacity:1; transform:translate(var(--bx),var(--by)) scale(1.15) rotate(300deg);}
    100%{opacity:0; transform:translate(calc(var(--bx)*.6),calc(var(--by)*1.4)) scale(.5) rotate(380deg);}
  }

  /* SCREEN EFFECTS */
  #flash-overlay{position:fixed;inset:0;z-index:9;pointer-events:none;opacity:0;}
  #flash-overlay.goal-flash{animation:goalFlash .7s ease-out;}
  #flash-overlay.block-flash{animation:blockFlash .5s ease-out;}
  @keyframes goalFlash{
    0%{opacity:0; background:radial-gradient(circle, rgba(244,217,160,.55), transparent 70%);}
    40%{opacity:1;}
    100%{opacity:0;}
  }
  @keyframes blockFlash{
    0%{opacity:0; background:radial-gradient(circle, rgba(138,107,214,.5), transparent 70%);}
    35%{opacity:1;}
    100%{opacity:0;}
  }
  body.shake{animation:shakeit .35s ease-in-out;}
  @keyframes shakeit{
    0%,100%{transform:translate(0,0);}
    20%{transform:translate(-6px,3px);}
    40%{transform:translate(5px,-4px);}
    60%{transform:translate(-4px,2px);}
    80%{transform:translate(3px,-2px);}
  }

  /* MAIN PITCH */
  #pitch{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;
    justify-content:center;gap:clamp(4px,1.2vw,8px);padding:6px 8px;overflow-y:auto;min-height:0;}

  .lane{display:flex;align-items:center;gap:clamp(6px,1.5vw,12px);
    background:rgba(15,12,30,.55);border:1px solid rgba(244,217,160,.18);
    border-radius:14px;padding:clamp(5px,1.3vw,9px) clamp(8px,2vw,14px);
    backdrop-filter:blur(3px); transition:transform .15s, box-shadow .2s;}
  .lane.targeted{box-shadow:0 0 0 2px var(--cyan), 0 0 20px rgba(125,249,255,.4);}
  .lane.defended-reveal{box-shadow:0 0 0 2px var(--obsidian-violet), 0 0 20px rgba(138,107,214,.5);}

  .portrait{width:clamp(34px,9vw,52px);height:clamp(34px,9vw,52px);border-radius:50%;
    border:2px solid var(--astral-gold); flex-shrink:0; background-size:cover;background-position:center top;
    box-shadow:0 0 8px rgba(244,217,160,.4); transition:box-shadow .3s, border-color .3s;}
  .portrait.charge-glow1{box-shadow:0 0 12px var(--astral-gold);}
  .portrait.charge-glow2{box-shadow:0 0 18px var(--astral-gold), 0 0 8px var(--cyan); border-color:var(--cyan);}
  .portrait.charge-glow3{box-shadow:0 0 26px var(--cyan), 0 0 14px var(--astral-gold); border-color:var(--cyan);
    animation:breakthrough 1.4s ease-in-out infinite;}
  @keyframes breakthrough{
    0%,100%{filter:brightness(1) saturate(1);}
    50%{filter:brightness(1.35) saturate(1.3);}
  }
  .lane.charging{animation:chargeFlash .35s ease-out;}
  @keyframes chargeFlash{
    0%{background:rgba(244,217,160,.25);}
    100%{background:rgba(15,12,30,.55);}
  }

  .lane-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px;}
  .lane-name{font-size:clamp(10px,2.6vw,14px);font-weight:700;color:var(--astral-cream);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .charge-track{display:flex;gap:3px;}
  .charge-pip{width:clamp(10px,2.6vw,16px);height:clamp(6px,1.6vw,9px);border-radius:3px;
    background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.2); transition:.2s;}
  .charge-pip.filled{background:linear-gradient(90deg,var(--astral-gold),var(--cyan));
    border-color:var(--astral-gold); box-shadow:0 0 6px var(--cyan);}

  .lane-actions{display:flex;gap:clamp(4px,1.2vw,8px);flex-shrink:0;}
  .btn{border:none;border-radius:9px;padding:clamp(6px,1.8vw,10px) clamp(8px,2.4vw,14px);
    font-size:clamp(9px,2.4vw,12px);font-weight:800;letter-spacing:.5px;cursor:pointer;
    transition:transform .08s, filter .15s; color:#1a1430;}
  .btn:active{transform:scale(.93);}
  .btn-charge{background:linear-gradient(135deg,var(--astral-gold),#fff3da);}
  .btn-shoot{background:linear-gradient(135deg,var(--cyan),#bdfcff); color:#08222a;}
  .btn:disabled{opacity:.3; cursor:default; filter:grayscale(.6);}

  /* STATUS BAR */
  #status{position:relative;z-index:2;text-align:center;padding:6px 12px 8px;flex-shrink:0;
    font-size:clamp(11px,2.8vw,15px); min-height:1.4em; font-weight:600; letter-spacing:.5px;}
  #status.flash-good{color:var(--astral-gold); text-shadow:0 0 12px var(--astral-gold);}
  #status.flash-bad{color:var(--obsidian-violet); text-shadow:0 0 12px var(--obsidian-violet);}

  /* OVERLAYS */
  .overlay{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;
    background:rgba(5,6,14,.86); backdrop-filter:blur(6px); padding:20px;}
  .overlay.hidden{display:none;}
  .card{background:linear-gradient(160deg,rgba(26,20,48,.95),rgba(10,8,20,.97));
    border:1px solid rgba(244,217,160,.3); border-radius:20px; padding:clamp(20px,5vw,40px);
    max-width:480px; width:100%; text-align:center; box-shadow:0 0 60px rgba(138,107,214,.25);}
  .card h2{margin:0 0 10px; font-size:clamp(18px,5vw,28px);
    background:linear-gradient(90deg,var(--astral-gold),var(--cyan));
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  .card p{font-size:clamp(12px,3.2vw,15px);opacity:.85;line-height:1.6;margin:10px 0;}
  .card .goal-art{width:clamp(80px,22vw,140px);height:clamp(80px,22vw,140px);border-radius:50%;
    margin:10px auto;background:url('./assets/goal_portal.png') center/cover no-repeat;
    box-shadow:0 0 40px rgba(125,249,255,.4);}
  .big-btn{display:inline-block;margin-top:14px;border:none;border-radius:12px;
    padding:14px 32px;font-size:clamp(13px,3.4vw,16px);font-weight:800;letter-spacing:1px;
    background:linear-gradient(135deg,var(--astral-gold),var(--cyan)); color:#0a0a14;cursor:pointer;}
  .big-btn:active{transform:scale(.96);}
  #dev{position:fixed;top:4px;left:4px;color:#0f0;font:11px monospace;display:none;z-index:99;}
</style>
</head>
<body>
<div id="flash-overlay"></div>
<div id="fly-ball"></div>
<button id="mute-btn"></button>
<div id="app">
  <div id="header">
    <h1 id="title"></h1>
    <div class="sub" id="subtitle"></div>
  </div>
  <div id="scoreboard">
    <div class="score-block astral">
      <div class="team-name" id="astral-label"></div>
      <div class="num" id="astral-score">0</div>
    </div>
    <div id="ball-icon"></div>
    <div class="score-block obsidian">
      <div class="team-name" id="obsidian-label"></div>
      <div class="num" id="obsidian-score">0</div>
    </div>
  </div>
  <div id="round-label-wrap" style="text-align:center;flex-shrink:0;">
    <div id="round-label"></div>
  </div>
  <div id="pitch"></div>
  <div id="status"></div>
</div>

<div id="dev"></div>

<!-- Intro overlay -->
<div class="overlay" id="intro-overlay">
  <div class="card">
    <h2 id="intro-title"></h2>
    <p id="intro-tagline" style="font-style:italic;"></p>
    <div class="goal-art"></div>
    <p id="intro-howto"></p>
    <button class="big-btn" id="start-btn"></button>
  </div>
</div>

<!-- Game over overlay -->
<div class="overlay hidden" id="end-overlay">
  <div class="card">
    <h2 id="end-title"></h2>
    <div class="goal-art"></div>
    <p id="end-score"></p>
    <button class="big-btn" id="restart-btn"></button>
  </div>
</div>

<!-- AUDIO HOOKS — drop your own files into ./assets/ with these exact names to enable sound -->
<audio id="audio-bg" loop preload="none">
  <source src="./assets/music-bg.mp3" type="audio/mpeg">
</audio>
<audio id="sfx-charge" preload="none"><source src="./assets/sfx-charge.mp3" type="audio/mpeg"></audio>
<audio id="sfx-shoot" preload="none"><source src="./assets/sfx-shoot.mp3" type="audio/mpeg"></audio>
<audio id="sfx-goal" preload="none"><source src="./assets/sfx-goal.mp3" type="audio/mpeg"></audio>
<audio id="sfx-block" preload="none"><source src="./assets/sfx-block.mp3" type="audio/mpeg"></audio>
<audio id="sfx-ai-goal" preload="none"><source src="./assets/sfx-ai-goal.mp3" type="audio/mpeg"></audio>

<script type="module">
import { STR } from "./strings.js";

// ---------- ROSTER ----------
const ASTRAL = [
  { id:"ava",    name:"Ava Bloom",   img:"./assets/astral_ava.png" },
  { id:"ivoire", name:"Ivoire Lux",  img:"./assets/astral_ivoire.png" },
  { id:"kaia",   name:"Kaia Luneth", img:"./assets/astral_kaia.png" },
  { id:"suri",   name:"Suri Vale",   img:"./assets/astral_suri.png" },
  { id:"elara",  name:"Elara Voss",  img:"./assets/astral_elara.png" },
];
const OBSIDIAN_NAMES = ["Vaelora","Kael Draven","Orion Vale","Seraphine Veyr","Raze Solaryn"];

const GOALS_TO_WIN = 5;
const MAX_CHARGE = 3;

// ---------- STATE ----------
let state = {
  astralScore: 0,
  obsidianScore: 0,
  round: 1,
  charges: ASTRAL.map(()=>0),     // player charge per lane
  resolving: false,
  over: false,
};

// seeded RNG for determinism
let seed = Date.now() % 2147483647;
function rand(){ seed = (seed * 16807) % 2147483647; return (seed-1)/2147483646; }
function randInt(n){ return Math.floor(rand()*n); }

// ---------- DOM SETUP ----------
document.getElementById("title").textContent = STR.title;
document.getElementById("subtitle").textContent = STR.subtitle;
document.getElementById("astral-label").textContent = STR.astralScore;
document.getElementById("obsidian-label").textContent = STR.obsidianScore;
document.getElementById("intro-title").textContent = STR.title;
document.getElementById("intro-tagline").textContent = STR.tagline;
document.getElementById("intro-howto").textContent = STR.howTo;
document.getElementById("start-btn").textContent = STR.startMatch;
document.getElementById("restart-btn").textContent = STR.playAgain;

const pitch = document.getElementById("pitch");
const statusEl = document.getElementById("status");
const roundLabel = document.getElementById("round-label");

// ---------- AUDIO ----------
let muted = localStorage.getItem ? false : false; // no persistent storage in artifacts; default on
muted = false;
const audioBg = document.getElementById("audio-bg");
const sfx = {
  charge: document.getElementById("sfx-charge"),
  shoot: document.getElementById("sfx-shoot"),
  goal: document.getElementById("sfx-goal"),
  block: document.getElementById("sfx-block"),
  aiGoal: document.getElementById("sfx-ai-goal"),
};
function playSfx(name){
  if(muted) return;
  const el = sfx[name];
  if(!el) return;
  try{
    el.currentTime = 0;
    el.play().catch(()=>{}); // silently ignore if file missing or blocked
  }catch(e){}
}
function startBgMusic(){
  if(muted) return;
  audioBg.volume = 0.35;
  audioBg.play().catch(()=>{}); // ignore if no file / autoplay blocked
}
function stopBgMusic(){ audioBg.pause(); }

const muteBtn = document.getElementById("mute-btn");
function updateMuteBtn(){ muteBtn.textContent = muted ? STR.muteOff : STR.muteOn; }
muteBtn.onclick = ()=>{
  muted = !muted;
  updateMuteBtn();
  if(muted) stopBgMusic(); else startBgMusic();
};
updateMuteBtn();

function laneRow(player, idx){
  const row = document.createElement("div");
  row.className = "lane";
  row.id = "lane-"+idx;

  const portrait = document.createElement("div");
  portrait.className = "portrait";
  portrait.style.backgroundImage = `url('${player.img}')`;

  const info = document.createElement("div");
  info.className = "lane-info";
  const nameEl = document.createElement("div");
  nameEl.className = "lane-name";
  nameEl.textContent = player.name;
  const track = document.createElement("div");
  track.className = "charge-track";
  for(let i=0;i<MAX_CHARGE;i++){
    const pip = document.createElement("div");
    pip.className = "charge-pip";
    pip.dataset.pip = i;
    track.appendChild(pip);
  }
  info.appendChild(nameEl);
  info.appendChild(track);

  const actions = document.createElement("div");
  actions.className = "lane-actions";
  const chargeBtn = document.createElement("button");
  chargeBtn.className = "btn btn-charge";
  chargeBtn.textContent = STR.charge;
  chargeBtn.onclick = ()=>onLaneAction(idx,"charge");
  const shootBtn = document.createElement("button");
  shootBtn.className = "btn btn-shoot";
  shootBtn.textContent = STR.shoot;
  shootBtn.onclick = ()=>onLaneAction(idx,"shoot");
  actions.appendChild(chargeBtn);
  actions.appendChild(shootBtn);

  row.appendChild(portrait);
  row.appendChild(info);
  row.appendChild(actions);
  return row;
}

ASTRAL.forEach((p,i)=> pitch.appendChild(laneRow(p,i)));

function render(){
  document.getElementById("astral-score").textContent = state.astralScore;
  document.getElementById("obsidian-score").textContent = state.obsidianScore;
  roundLabel.textContent = `${STR.round} ${state.round}`;

  ASTRAL.forEach((p,i)=>{
    const row = document.getElementById("lane-"+i);
    const pips = row.querySelectorAll(".charge-pip");
    pips.forEach((pip,pi)=> pip.classList.toggle("filled", pi < state.charges[i]));
    const shootBtn = row.querySelector(".btn-shoot");
    const chargeBtn = row.querySelector(".btn-charge");
    const disabled = state.resolving || state.over;
    shootBtn.disabled = disabled || state.charges[i] < 1;
    chargeBtn.disabled = disabled || state.charges[i] >= MAX_CHARGE;
    row.classList.remove("targeted","defended-reveal");

    const portrait = row.querySelector(".portrait");
    portrait.classList.remove("charge-glow1","charge-glow2","charge-glow3");
    if(state.charges[i] === 1) portrait.classList.add("charge-glow1");
    else if(state.charges[i] === 2) portrait.classList.add("charge-glow2");
    else if(state.charges[i] >= 3) portrait.classList.add("charge-glow3");
  });
}
render();
setStatus(STR.yourTurn);

function setStatus(text, cls){
  statusEl.textContent = text;
  statusEl.className = "";
  if(cls) statusEl.classList.add(cls);
}

// ---------- GAME ACTIONS ----------
function onLaneAction(idx, action){
  if(state.resolving || state.over) return;

  if(action === "charge"){
    if(state.charges[idx] >= MAX_CHARGE) return;
    state.charges[idx] += 1;
    render();
    setStatus(STR.charged);
    playSfx("charge");
    const row = document.getElementById("lane-"+idx);
    row.classList.remove("charging");
    requestAnimationFrame(()=>row.classList.add("charging"));
    setTimeout(()=> resolveAITurn(null), 350);
    return;
  }

  if(action === "shoot"){
    if(state.charges[idx] < 1) { setStatus(STR.needCharge); return; }
    resolveShot(idx);
  }
}

function flyBall(fromEl, toEl, success){
  const flyBall = document.getElementById("fly-ball");
  const fromRect = fromEl.getBoundingClientRect();
  const toRect = toEl.getBoundingClientRect();
  const startX = fromRect.left + fromRect.width/2 - 23;
  const startY = fromRect.top + fromRect.height/2 - 23;
  const endX = toRect.left + toRect.width/2 - 23;
  const endY = toRect.top + toRect.height/2 - 23;
  const dx = endX - startX, dy = endY - startY;

  flyBall.style.left = startX+"px";
  flyBall.style.top = startY+"px";
  flyBall.style.animation = "none";
  flyBall.classList.remove("flying");
  flyBall.style.setProperty("--fx", dx+"px");
  flyBall.style.setProperty("--fy", dy+"px");
  flyBall.style.setProperty("--bx", (dx*0.5)+"px");
  flyBall.style.setProperty("--by", (dy*0.5)+"px");

  requestAnimationFrame(()=>{
    flyBall.classList.add("flying");
    flyBall.style.animation = success
      ? "flyToGoal .7s cubic-bezier(.3,.6,.4,1) forwards"
      : "flyBlocked .55s cubic-bezier(.3,.6,.4,1) forwards";
  });
}

function resolveShot(idx){
  state.resolving = true;
  render();
  setStatus(STR.aiDefending);
  playSfx("shoot");

  // AI picks a lane to defend - weighted toward lanes with higher charge (smarter over time)
  const weights = state.charges.map(c => 1 + c*1.5);
  const total = weights.reduce((a,b)=>a+b,0);
  let r = rand()*total, defendIdx = 0;
  for(let i=0;i<weights.length;i++){ r -= weights[i]; if(r<=0){ defendIdx=i; break; } }

  const row = document.getElementById("lane-"+idx);
  row.classList.add("targeted");

  setTimeout(()=>{
    const charge = state.charges[idx];
    const blocked = (defendIdx === idx) && (charge < MAX_CHARGE);

    if(defendIdx === idx){
      document.getElementById("lane-"+defendIdx).classList.add("defended-reveal");
    }

    // fly the ball from the shooting lane's portrait to the scoreboard ball icon
    const fromEl = row.querySelector(".portrait");
    const toEl = document.getElementById("ball-icon");
    flyBall(fromEl, toEl, !blocked);

    setTimeout(()=>{
      if(!blocked){
        state.astralScore += 1;
        setStatus(STR.goalScored, "flash-good");
        playSfx("goal");
        document.getElementById("flash-overlay").classList.remove("goal-flash","block-flash");
        requestAnimationFrame(()=>document.getElementById("flash-overlay").classList.add("goal-flash"));
        const ballIcon = document.getElementById("ball-icon");
        ballIcon.classList.remove("pulse");
        requestAnimationFrame(()=>ballIcon.classList.add("pulse"));
      } else {
        setStatus(STR.goalBlocked, "flash-bad");
        playSfx("block");
        document.getElementById("flash-overlay").classList.remove("goal-flash","block-flash");
        requestAnimationFrame(()=>document.getElementById("flash-overlay").classList.add("block-flash"));
        document.body.classList.remove("shake");
        requestAnimationFrame(()=>document.body.classList.add("shake"));
      }
      state.charges[idx] = 0;
      render();

      setTimeout(()=>{
        checkGameOver();
        if(state.over) return;
        resolveAITurn(null);
      }, 700);
    }, blocked ? 480 : 620);
  }, 700);
}

function resolveAITurn(){
  // After player's action, Obsidian Veil takes their turn: build toward a goal attempt
  state.resolving = true;
  render();

  setTimeout(()=>{
    // simple AI: random chance to score based on round progression
    const scoreChance = Math.min(0.18 + state.round*0.015, 0.45);
    if(rand() < scoreChance){
      state.obsidianScore += 1;
      setStatus(STR.aiGoal, "flash-bad");
      playSfx("aiGoal");
      document.getElementById("flash-overlay").classList.remove("goal-flash","block-flash");
      requestAnimationFrame(()=>document.getElementById("flash-overlay").classList.add("block-flash"));
      document.body.classList.remove("shake");
      requestAnimationFrame(()=>document.body.classList.add("shake"));
    } else {
      setStatus(STR.aiBlocked, "flash-good");
    }

    state.round += 1;
    state.resolving = false;
    render();

    setTimeout(()=>{
      checkGameOver();
      if(!state.over) setStatus(STR.yourTurn);
    }, 600);
  }, 600);
}

function checkGameOver(){
  if(state.astralScore >= GOALS_TO_WIN || state.obsidianScore >= GOALS_TO_WIN){
    state.over = true;
    render();
    showEnd();
  }
}

function showEnd(){
  const win = state.astralScore >= GOALS_TO_WIN;
  document.getElementById("end-title").textContent = win ? STR.win : STR.lose;
  document.getElementById("end-score").textContent =
    `${STR.astralScore} ${state.astralScore} — ${state.obsidianScore} ${STR.obsidianScore}`;
  document.getElementById("end-overlay").classList.remove("hidden");
}

// ---------- OVERLAYS ----------
document.getElementById("start-btn").onclick = ()=>{
  document.getElementById("intro-overlay").classList.add("hidden");
  startBgMusic();
};
document.getElementById("restart-btn").onclick = ()=>{
  state = { astralScore:0, obsidianScore:0, round:1, charges:ASTRAL.map(()=>0), resolving:false, over:false };
  render();
  setStatus(STR.yourTurn);
  document.getElementById("end-overlay").classList.add("hidden");
};

// ---------- DEV OVERLAY ----------
const dev = new URLSearchParams(location.search).has("dev");
if(dev){
  const el = document.getElementById("dev");
  el.style.display = "block";
  let frames=0, last=performance.now(), fpsAt=last;
  function loop(now){
    requestAnimationFrame(loop);
    frames++;
    if(now-fpsAt>=500){ el.textContent = Math.round(frames*1000/(now-fpsAt))+" fps"; frames=0; fpsAt=now; }
  }
  requestAnimationFrame(loop);
}

// pause-friendly: nothing time-based runs while tab hidden beyond timeouts (acceptable for turn-based)
</script>
</body>
</html>
